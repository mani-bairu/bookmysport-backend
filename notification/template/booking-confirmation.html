<!DOCTYPE html>
<html>

<head>
    <style>

        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
        }

        .container {
            width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        .header {
            background:#1e88e5;
            color:white;
            padding:20px;
            text-align:center;
        }

        .details {
            margin-top:20px;
        }

        .footer {
            margin-top:30px;
            color:gray;
            font-size:12px;
        }

    </style>
</head>


<body>

<div class="container">


    <div class="header">

        <h1>
            BookMySport
        </h1>

    </div>


    <h2>
        Booking Confirmed 🎉
    </h2>


    <p>
        Hi <b>{{userName}}</b>,
    </p>


    <p>
        Your sports slot has been successfully booked.
    </p>


    <div class="details">

        <p>
            <b>Venue:</b> {{venueName}}
        </p>

        <p>
            <b>Sport:</b> {{sportName}}
        </p>


        <p>
            <b>Date:</b> {{date}}
        </p>


        <p>
            <b>Time:</b> {{startTime}} - {{endTime}}
        </p>


        <p>
            <b>Amount Paid:</b> ₹{{amount}}
        </p>


    </div>


    <p>
        Thank you for booking with BookMySport.
    </p>


    <div class="footer">

        <p>
            © 2026 BookMySport
        </p>

    </div>


</div>


</body>

</html>
